name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10 (testbench 8) — PHP 8.1 / 8.2
          - { php: "8.1", laravel: "10", testbench: "8" }
          - { php: "8.2", laravel: "10", testbench: "8" }
          # Laravel 11 (testbench 9) — PHP 8.2 / 8.3
          - { php: "8.2", laravel: "11", testbench: "9" }
          - { php: "8.3", laravel: "11", testbench: "9" }
          # Laravel 12 (testbench 10) — PHP 8.2 / 8.3
          - { php: "8.2", laravel: "12", testbench: "10" }
          - { php: "8.3", laravel: "12", testbench: "10" }
    name: L${{ matrix.laravel }} · PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      # testbench major ↔ Laravel major (8→10, 9→11, 10→12); pinning testbench
      # also pulls the matching illuminate major, so no need to pin illuminate/*.
      - name: Pin testbench (Laravel ${{ matrix.laravel }})
        run: composer require "orchestra/testbench:^${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: |
          # The compat matrix installs old Laravel 10/11; testbench 8/9 constrain
          # laravel/framework to ranges whose only satisfiable versions carry
          # security advisories that composer (2.9+) blocks at resolution time.
          # Disable the block for this compat-test install only — it is CI-scoped
          # (modifies the ephemeral checkout) and ships to no consumer.
          composer config --no-interaction policy.advisories.block false
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
